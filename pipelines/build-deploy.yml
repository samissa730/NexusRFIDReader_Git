name: $(date:yyyyMMdd)$(rev:.rr)

trigger:
  batch: true
  branches:
    include:
      - refs/heads/main
  paths:
    include:
      - requirements.txt
      - docker/**
      - main.py
      - ui/**
      - utils/**
      - screens/**
      - widgets/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - requirements.txt
      - docker/**
      - main.py
      - ui/**
      - utils/**
      - screens/**
      - widgets/**

variables:
  - group: shared-variables
  - name: pythonVersion
    value: '3.12.10'
  # Dev/test: fixed tag (e.g. sam730/nexusrfid:main); each push updates that tag.
  - name: dockerImageTag
    value: 'main'
  # Docker Hub (dev/test): Docker Registry service connection → docker.io
  - name: dockerHubServiceConnection
    value: 'dockerhub-sam730'
  - name: dockerHubRepository
    value: 'sam730/nexusrfid'
  # --- Prod (ACR): uncomment when ready ---
  # - name: acrServiceConnection
  #   value: 'acr-nexusrfid-prod'
  # - name: acrLoginServer
  #   value: 'YOUR_REGISTRY.azurecr.io'
  # - name: acrRepository
  #   value: 'nexusrfid'

stages:
  - stage: BuildProject
    displayName: 'Build Docker Image and Push'
    jobs:
      - job: DockerBuild
        displayName: 'Docker Build (Linux)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            displayName: 'Checkout Repository'
            clean: true

          - task: UsePythonVersion@0
            displayName: 'Use Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true
              architecture: 'x64'

          - script: |
              python -m pip install --upgrade pip
              pip install pytest
            displayName: 'Install test dependencies'

          - script: |
              pip install -r requirements.txt
            displayName: 'Install project dependencies'

          - bash: |
              if [ -d "tests" ]; then
                python -m pytest tests/ --junitxml=$(Agent.TempDirectory)/test-results.xml || echo "Tests completed with issues"
              elif [ -d "UnitTests" ]; then
                python -m pytest UnitTests/ --junitxml=$(Agent.TempDirectory)/test-results.xml || echo "Tests completed with issues"
              else
                mkdir -p $(Agent.TempDirectory)
                echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="NoTests" tests="0" failures="0" errors="0" skipped="0"></testsuite></testsuites>' > $(Agent.TempDirectory)/test-results.xml
              fi
            displayName: 'Run tests'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFiles: '$(Agent.TempDirectory)/test-results.xml'
              testRunTitle: 'Linux Test Results'
              failTaskOnFailedTests: false
            condition: always()

          # PR: validate Dockerfile builds; do not push.
          - task: Docker@2
            displayName: 'Build Docker image (PR)'
            condition: eq(variables['Build.Reason'], 'PullRequest')
            inputs:
              command: build
              repository: $(dockerHubRepository)
              dockerfile: 'docker/prod/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                pr-$(System.PullRequest.PullRequestId)

          # main / non-PR: push fixed tag (updates :main on each successful merge).
          - task: Docker@2
            displayName: 'Build and push to Docker Hub (tag: $(dockerImageTag))'
            condition: ne(variables['Build.Reason'], 'PullRequest')
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerHubServiceConnection)
              repository: $(dockerHubRepository)
              dockerfile: 'docker/prod/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(dockerImageTag)

          # Prod: push to ACR — uncomment together with ACR variables above.
          # - task: Docker@2
          #   displayName: 'Build and push to ACR (tag: $(dockerImageTag))'
          #   condition: ne(variables['Build.Reason'], 'PullRequest')
          #   inputs:
          #     command: buildAndPush
          #     containerRegistry: $(acrServiceConnection)
          #     repository: $(acrRepository)
          #     dockerfile: 'docker/prod/Dockerfile'
          #     buildContext: '$(Build.SourcesDirectory)'
          #     tags: |
          #       $(dockerImageTag)

  - stage: PostBuild
    displayName: 'Post-Build Activities'
    dependsOn: BuildProject
    condition: succeeded()
    jobs:
      - job: GenerateReleaseNotes
        displayName: 'Generate Release Notes'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "=== NexusRFIDReader Build $(Build.BuildNumber) Release Notes ===" > $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "**Build Information:**" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Build Number: $(Build.BuildNumber)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Build Date: $(date)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Source Branch: $(Build.SourceBranch)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Source Version: $(Build.SourceVersion)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "**Container image (dev/test — Docker Hub; fixed tag):**" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- $(dockerHubRepository):$(dockerImageTag)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
            displayName: 'Generate Release Notes'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Release Notes'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md'
              artifactName: 'ReleaseNotes-$(Build.BuildNumber)'
              publishLocation: 'pipeline'

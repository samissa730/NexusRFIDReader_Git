name: $(date:yyyyMMdd)$(rev:.rr)

trigger:
  batch: true
  branches:
    include:
      - refs/heads/main
  paths:
    include:
      - requirements.txt
      - docker/**
      - main.py
      - ui/**
      - utils/**
      - screens/**
      - widgets/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - requirements.txt
      - docker/**
      - main.py
      - ui/**
      - utils/**
      - screens/**
      - widgets/**

variables:
  - group: shared-variables
  - name: pythonVersion
    value: '3.12.10'
  - name: projectName
    value: 'NexusRFIDReader'
  - name: buildConfiguration
    value: 'Release'
  - name: storageAccountName
    value: 'sa{0}rfidlocate'
  - name: containerName
    value: 'deviceupdates'
  - name: workLoadServiceConnection
    value: 'spotlight-{0}-infrastructure-service-connection'
  # Docker Hub: create a "Docker Registry" service connection in Azure DevOps (docker.io) and set this name to match.
  - name: dockerHubServiceConnection
    value: 'dockerhub-sam730'
  - name: dockerHubRepository
    value: 'sam730/nexusrfid'

parameters:
  - name: environments
    type: object
    default:
      - name: Dev
        deployBranch: refs/heads/main
      - name: Test
        deployBranch: refs/heads/main
      - name: Prod
        deployBranch: refs/heads/main

stages:
  - stage: BuildProject
    displayName: 'Build Docker Image and Push'
    jobs:
      - job: DockerBuild
        displayName: 'Docker Build (Linux)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            displayName: 'Checkout Repository'
            clean: true

          - task: UsePythonVersion@0
            displayName: 'Use Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true
              architecture: 'x64'

          - script: |
              python -m pip install --upgrade pip
              pip install pytest
            displayName: 'Install test dependencies'

          - script: |
              pip install -r requirements.txt
            displayName: 'Install project dependencies'

          - bash: |
              if [ -d "tests" ]; then
                python -m pytest tests/ --junitxml=$(Agent.TempDirectory)/test-results.xml || echo "Tests completed with issues"
              elif [ -d "UnitTests" ]; then
                python -m pytest UnitTests/ --junitxml=$(Agent.TempDirectory)/test-results.xml || echo "Tests completed with issues"
              else
                mkdir -p $(Agent.TempDirectory)
                echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="NoTests" tests="0" failures="0" errors="0" skipped="0"></testsuite></testsuites>' > $(Agent.TempDirectory)/test-results.xml
              fi
            displayName: 'Run tests'
            continueOnError: true

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFiles: '$(Agent.TempDirectory)/test-results.xml'
              testRunTitle: 'Linux Test Results'
              failTaskOnFailedTests: false
            condition: always()

          # PR: validate Dockerfile builds; do not push to Docker Hub.
          - task: Docker@2
            displayName: 'Build Docker image (PR)'
            condition: eq(variables['Build.Reason'], 'PullRequest')
            inputs:
              command: build
              repository: $(dockerHubRepository)
              dockerfile: 'docker/prod/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                pr-$(System.PullRequest.PullRequestId)

          # main / non-PR: push sam730/nexusrfid:$(Build.BuildNumber)
          - task: Docker@2
            displayName: 'Build and push Docker image to Docker Hub'
            condition: ne(variables['Build.Reason'], 'PullRequest')
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerHubServiceConnection)
              repository: $(dockerHubRepository)
              dockerfile: 'docker/prod/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(Build.BuildNumber)

          - bash: |
              echo "$(dockerHubRepository):$(Build.BuildNumber)" > "$(Build.ArtifactStagingDirectory)/docker-image.txt"
            displayName: 'Write docker image reference'
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Docker image reference'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/docker-image.txt'
              artifactName: 'docker-image-ref'
              publishLocation: 'pipeline'
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

  - stage: PostBuild
    displayName: 'Post-Build Activities'
    dependsOn: BuildProject
    condition: succeeded()
    jobs:
      - job: GenerateReleaseNotes
        displayName: 'Generate Release Notes'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "=== NexusRFIDReader Build $(Build.BuildNumber) Release Notes ===" > $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "**Build Information:**" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Build Number: $(Build.BuildNumber)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Build Date: $(date)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Source Branch: $(Build.SourceBranch)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- Source Version: $(Build.SourceVersion)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "**Container image (Docker Hub):**" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- $(dockerHubRepository):$(Build.BuildNumber)" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "**Deployment Environments (blob release pointer):**" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- DEV: sadevrf $(containerName)/releases/$(Build.BuildNumber)/docker-image.txt" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- TEST: satestrf $(containerName)/releases/$(Build.BuildNumber)/docker-image.txt" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
              echo "- PROD: saprodrf $(containerName)/releases/$(Build.BuildNumber)/docker-image.txt" >> $(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md
            displayName: 'Generate Release Notes'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Release Notes'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/RELEASE_NOTES.md'
              artifactName: 'ReleaseNotes-$(Build.BuildNumber)'
              publishLocation: 'pipeline'

  - stage: DeployDev
    displayName: Deploy to DEV
    lockBehavior: runLatest
    dependsOn:
      - BuildProject
      - PostBuild
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployReleasePointer
        displayName: Upload Docker image reference to DEV Blob Storage
        continueOnError: false
        environment:
          name: dev
        variables:
          - group: dev-variables
          - group: dev-keyvault-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Docker image reference'
                  inputs:
                    artifact: 'docker-image-ref'
                    path: '$(Pipeline.Workspace)/docker-ref'

                - task: AzureFileCopy@6
                  displayName: 'Upload docker-image.txt to DEV'
                  inputs:
                    SourcePath: '$(Pipeline.Workspace)/docker-ref/docker-image.txt'
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'dev') }}
                    Destination: 'AzureBlob'
                    storage: ${{ format(variables.storageAccountName, 'dev') }}
                    ContainerName: '$(containerName)'
                    BlobPrefix: 'releases/$(Build.BuildNumber)/'

                - task: AzureCLI@2
                  displayName: 'Verify DEV docker-image.txt'
                  inputs:
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'dev') }}
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      S="${{ format(variables.storageAccountName, 'dev') }}"
                      C="$(containerName)"
                      B="releases/$(Build.BuildNumber)/docker-image.txt"
                      az storage blob exists --account-name "$S" --container-name "$C" --name "$B" --auth-mode login --output tsv | grep -q "True" && echo "✅ $B" || (echo "❌ $B"; exit 1)

  - stage: DeployTest
    displayName: Deploy to TEST
    lockBehavior: runLatest
    dependsOn:
      - BuildProject
      - PostBuild
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployReleasePointer
        displayName: Upload Docker image reference to TEST Blob Storage
        continueOnError: false
        environment:
          name: test
        variables:
          - group: test-variables
          - group: test-keyvault-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Docker image reference'
                  inputs:
                    artifact: 'docker-image-ref'
                    path: '$(Pipeline.Workspace)/docker-ref'

                - task: AzureFileCopy@6
                  displayName: 'Upload docker-image.txt to TEST'
                  inputs:
                    SourcePath: '$(Pipeline.Workspace)/docker-ref/docker-image.txt'
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'test') }}
                    Destination: 'AzureBlob'
                    storage: ${{ format(variables.storageAccountName, 'test') }}
                    ContainerName: '$(containerName)'
                    BlobPrefix: 'releases/$(Build.BuildNumber)/'

                - task: AzureCLI@2
                  displayName: 'Verify TEST docker-image.txt'
                  inputs:
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'test') }}
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      S="${{ format(variables.storageAccountName, 'test') }}"
                      C="$(containerName)"
                      B="releases/$(Build.BuildNumber)/docker-image.txt"
                      az storage blob exists --account-name "$S" --container-name "$C" --name "$B" --auth-mode login --output tsv | grep -q "True" && echo "✅ $B" || (echo "❌ $B"; exit 1)

  - stage: DeployProd
    displayName: Deploy to PROD
    lockBehavior: runLatest
    dependsOn:
      - BuildProject
      - PostBuild
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployReleasePointer
        displayName: Upload Docker image reference to PROD Blob Storage
        continueOnError: false
        environment:
          name: prod
        variables:
          - group: prod-keyvault-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Docker image reference'
                  inputs:
                    artifact: 'docker-image-ref'
                    path: '$(Pipeline.Workspace)/docker-ref'

                - task: AzureFileCopy@6
                  displayName: 'Upload docker-image.txt to PROD'
                  inputs:
                    SourcePath: '$(Pipeline.Workspace)/docker-ref/docker-image.txt'
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'prod') }}
                    Destination: 'AzureBlob'
                    storage: ${{ format(variables.storageAccountName, 'prod') }}
                    ContainerName: '$(containerName)'
                    BlobPrefix: 'releases/$(Build.BuildNumber)/'

                - task: AzureCLI@2
                  displayName: 'Verify PROD docker-image.txt'
                  inputs:
                    azureSubscription: ${{ format(variables.workLoadServiceConnection, 'prod') }}
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      S="${{ format(variables.storageAccountName, 'prod') }}"
                      C="$(containerName)"
                      B="releases/$(Build.BuildNumber)/docker-image.txt"
                      az storage blob exists --account-name "$S" --container-name "$C" --name "$B" --auth-mode login --output tsv | grep -q "True" && echo "✅ $B" || (echo "❌ $B"; exit 1)

# step-ca EST server for local testing
# Run ./setup_step_ca.sh first to initialize CA, then: docker compose up -d

services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca-est-test
    ports:
      - "8443:8443"
    environment:
      - STEP_CA_URL=https://localhost:8443
      - STEP_CA_ADDRESS=:8443
    volumes:
      - ./step-ca-data:/home/step
    # Bypass image entrypoint that tries to open /dev/tty (causes "Restarting" in detached mode)
    entrypoint: ["step-ca"]
    command: ["/home/step/config/ca.json"]
    tty: false
    stdin_open: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "step", "ca", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

# step-ca + EST proxy for local testing
# Run ./setup_step_ca.sh first to initialize CA, then: docker compose up -d
# EST proxy exposes /est/simpleenroll and /est/cacerts using step-ca as backend.

services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca-est-test
    ports:
      - "8443:8443"
    environment:
      - STEP_CA_URL=https://localhost:8443
      - STEP_CA_ADDRESS=:8443
    volumes:
      - ./step-ca-data:/home/step
    entrypoint: ["step-ca"]
    command: ["/home/step/config/ca.json", "--password-file", "/home/step/secrets/password"]
    tty: false
    stdin_open: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "step", "ca", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  est-proxy:
    build: ./est_proxy
    container_name: est-proxy-test
    entrypoint: []
    command: ["python3", "-m", "gunicorn", "-b", "0.0.0.0:9443", "-w", "1", "--certfile", "/app/cert.pem", "--keyfile", "/app/key.pem", "app:app"]
    working_dir: /app
    ports:
      - "9443:9443"
    environment:
      - EST_BOOTSTRAP_TOKEN=changeme
      - STEP_CA_URL=https://step-ca:8443
      - STEP_CA_PASSWORD_FILE=/home/step/secrets/password
      - STEP_CA_ROOT_CERT=/home/step/certs/root_ca.crt
      - STEPPATH=/home/step
    volumes:
      - ./step-ca-data:/home/step:ro
    depends_on:
      step-ca:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "/app/healthcheck.py"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
